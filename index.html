<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find My Book</title>
  <link rel="stylesheet" href="static/styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-copy">
      <h1>Find My Book</h1>
      <p>Shop books online, place your order, and get fast delivery.</p>
    </div>
  </header>

  <main class="container">
    <section class="notifications" id="notifications"></section>

    <section class="catalog">
      <h2>Book Catalog</h2>
      <div class="book-grid" id="book-grid"></div>
    </section>

    <section class="orders">
      <h2>Recent Orders</h2>
      <ul id="order-list"></ul>
      <p id="empty-orders">No orders yet. Be the first to place one!</p>
    </section>
  </main>

  <footer>
    <p>Find My Book | Your online book ordering app.</p>
  </footer>

  <script src="static/script.js"></script>
</body>
</html>
